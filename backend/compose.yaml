services:
  db:
    image: postgres:18
    container_name: "ochame_postgres"
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nethub
    ports:
      - "5433:5432"
    volumes:
      - devices:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
  backend:
    container_name: "ochame_backend"
    build: .
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
volumes:
  devices:
